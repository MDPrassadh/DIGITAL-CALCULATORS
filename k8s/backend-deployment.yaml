apiVersion: apps/v1
kind: Deployment
metadata:
  name: calc-backend
  namespace: calculation-prod
  labels:
    app: calc-backend
    owner: m-durga-prasad
spec:
  replicas: 2
  selector:
    matchLabels:
      app: calc-backend
  template:
    metadata:
      labels:
        app: calc-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: backend
        image: 431412300010.dkr.ecr.us-east-1.amazonaws.com/calc-backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URL
          value: "postgresql://calc_admin:VaultPass99@calculatorss-database.calculation-prod.svc.cluster.local:5432/calculator_db"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ "ALL" ]
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: calc-backend-svc
  namespace: calculation-prod
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: calc-backend
