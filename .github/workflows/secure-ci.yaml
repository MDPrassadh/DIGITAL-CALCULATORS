name: Enterprise Multi-Tier CI

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: write

jobs:
  audit-build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Sync Codebase
        uses: actions/checkout@v4

      - name: Vulnerability Static Analysis (Trivy Engine)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './${{ matrix.component }}'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Authenticate to AWS Cloud via OIDC Architecture
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-${{ matrix.component }}-${{ github.run_id }}

      - name: Authenticate Container Registry (ECR)
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Tag Secure Container Image Layer
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/calc-${{ matrix.component }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/calc-${{ matrix.component }}:latest

  update-manifests:
    needs: audit-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Sync Codebase
        uses: actions/checkout@v4

      - name: Authenticate Container Registry (To get Registry URL safely)
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          aws-region: us-east-1
        # Note: If ECR login requires AWS credentials here, you can add aws-actions/configure-aws-credentials above this step as well.

      - name: Modify Tracking Manifest Targets for Backend & Frontend
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          sed -i "s|image: .\/calc-backend:.*|image: ${REGISTRY}/calc-backend:${{ github.sha }}|g" k8s/backend-deployment.yaml
          sed -i "s|image: .\/calc-frontend:.*|image: ${REGISTRY}/calc-frontend:${{ github.sha }}|g" k8s/frontend-deployment.yaml

      - name: Commit & Track GitOps Synchronization States
        run: |
          git config --global user.name "M Durga Prasad"
          git config --global user.email "mdurgaprasad@example.com"
          git add k8s/
          git commit -m "chore: automate tracking tag release ${{ github.sha }} [skip ci]" || echo "No variations mapped"
          git pull --rebase origin main
          git push origin main
