name: Enterprise Multi-Tier CI

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: write

jobs:
  audit-build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Sync Codebase
        uses: actions/checkout@v4

      - name: Vulnerability Static Analysis (Trivy Engine)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './${{ matrix.component }}'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Authenticate to AWS Cloud via OIDC Architecture
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          aws-session-name: GitHubActions-${{ matrix.component }}-${{ github.run_id }}
          
      - name: Authenticate Container Registry (ECR)
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Tag Secure Container Image Layer
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/calc-${{ matrix.component }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/calc-${{ matrix.component }}:latest

      # Automatically updates the Kubernetes manifests with the new image tag to trigger GitOps
      - name: Modify Tracking Manifest Targets
        run: |
          sed -i "s|image: .*\/calc-${{ matrix.component }}:.*|image: ${{ steps.login-ecr.outputs.registry }}/calc-${{ matrix.component }}:${{ github.sha }}|g" k8s/${{ matrix.component }}-deployment.yaml
          
      - name: Commit & Track GitOps Synchronization States
        run: |
          git config --global user.name "M Durga Prasad"
          git config --global user.email "mdurgaprasad@example.com"
          git add k8s/
          git commit -m "chore: automate tracking tag release ${{ github.sha }} [skip ci]" || echo "No variations mapped"
          git pull --rebase origin main
          git push origin main
