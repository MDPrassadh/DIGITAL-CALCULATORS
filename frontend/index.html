<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Calculators Platform</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- Main CSS -->
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="app-container">
      
      <!-- Sidebar (left aligned) -->
      <aside class="sidebar">
        <h2>🧮 Digital Calculator</h2>
        <button id="theme-toggle">🌙 Toggle Dark Mode</button>

        <!-- Auth Toggle -->
        <div class="auth-container">
          <div class="auth-toggle">
            <button id="show-signin" class="active">Sign In</button>
            <button id="show-signup">Sign Up</button>
          </div>

          <!-- Sign In Form -->
          <form id="signin-form" class="auth-form">
            <input type="email" placeholder="Email" required />
            <input type="password" placeholder="Password" required />
            <button type="submit">Sign In</button>
          </form>

          <!-- Sign Up Form -->
          <form id="signup-form" class="auth-form hidden">
            <input type="text" placeholder="Full Name" required />
            <input type="email" placeholder="Email" required />
            <input type="password" placeholder="Password" required />
            <button type="submit">Sign Up</button>
          </form>
        </div>
      </aside>

      <!-- Main content (calculator UI mounts here) -->
      <main id="root" class="main-content"></main>
    </div>

    <!-- Footer -->
    <footer class="app-footer">
      <p>© 2026 Digital Calculators Platform | Designed by Durga</p>
    </footer>

    <!-- React/Vite entry -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- Dark mode + Auth toggle logic -->
    <script>
      // Dark mode toggle
      const toggleBtn = document.getElementById('theme-toggle');
      toggleBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
      });

      // Auth toggle
      const signinBtn = document.getElementById('show-signin');
      const signupBtn = document.getElementById('show-signup');
      const signinForm = document.getElementById('signin-form');
      const signupForm = document.getElementById('signup-form');

      signinBtn.addEventListener('click', () => {
        signinForm.classList.remove('hidden');
        signupForm.classList.add('hidden');
        signinBtn.classList.add('active');
        signupBtn.classList.remove('active');
      });

      signupBtn.addEventListener('click', () => {
        signupForm.classList.remove('hidden');
        signinForm.classList.add('hidden');
        signupBtn.classList.add('active');
        signinBtn.classList.remove('active');
      });
    </script>
  </body>
</html>
